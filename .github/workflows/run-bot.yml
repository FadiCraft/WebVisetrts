name: Traffic Bot Runner

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */1 * * *'

jobs:
  run-puppeteer:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Run Traffic Script
        run: npm start
