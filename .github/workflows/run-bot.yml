name: Traffic Bot Runner

# متى يعمل السكربت؟
on:
  workflow_dispatch: # يسمح لك بتشغيله يدوياً بضغطة زر من صفحة Actions
  schedule:
    # يعمل تلقائياً كل 6 ساعات (يمكنك تغييرها)
    - cron: '0 */6 * * *'

jobs:
  run-puppeteer:
    runs-on: ubuntu-latest # خادم لينكس
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # استخدام إصدار حديث من Node.js
          
      - name: Install Dependencies
        run: npm install
        
      - name: Run Traffic Script
        run: npm start
